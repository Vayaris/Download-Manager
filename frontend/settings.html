<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paramètres — Download Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/css/style.css?v=11">
  <script>
    (function() {
      var t = localStorage.getItem('dm_theme');
      if (t === 'light' || t === 'dark') {
        document.documentElement.setAttribute('data-theme', t);
      }
    })();
  </script>
</head>
<body>

<!-- Login modal for settings page -->
<div id="login-modal" class="modal-overlay hidden">
  <div class="modal-box login-box">
    <div class="login-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </div>
    <h2>Download Manager</h2>
    <div id="login-form">
      <p class="login-sub">Connectez-vous pour accéder aux paramètres</p>
      <div class="form-group">
        <input type="text" id="login-username" class="form-input" placeholder="Nom d'utilisateur" autocomplete="username">
      </div>
      <div class="form-group">
        <input type="password" id="login-password" class="form-input" placeholder="Mot de passe" autocomplete="current-password">
      </div>
      <div id="otp-group" class="form-group hidden">
        <input type="text" id="login-otp" class="form-input" placeholder="Code 2FA à 6 chiffres" autocomplete="one-time-code" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" style="text-align:center;font-size:20px;letter-spacing:8px;font-family:var(--font-mono)">
        <p class="form-hint" style="margin-top:6px;font-size:12px">Entrez le code affiché dans votre application d'authentification</p>
      </div>
      <div id="login-error" class="error-msg hidden"></div>
      <button class="btn btn-primary full-width" onclick="doSettingsLogin()">Se connecter</button>
    </div>
  </div>
</div>

<div class="app">

  <header class="header">
    <div class="header-left">
      <div class="logo">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </div>
        <span class="logo-text">Download Manager</span>
      </div>

      <nav class="header-nav">
        <a href="/" class="nav-tab">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Téléchargements
        </a>
        <a href="/settings-page" class="nav-tab active">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Paramètres
        </a>
      </nav>
    </div>
    <div class="header-right">
      <button id="account-btn" class="btn-account hidden" onclick="openAccountModal()" title="Mon compte">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
      <button class="theme-toggle" onclick="toggleTheme()" title="Basculer thème clair/sombre">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </header>

  <div class="settings-wrap">

    <!-- AllDebrid -->
    <div class="settings-card">
      <h2 class="card-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        AllDebrid
        <span class="conn-badge unknown" id="alldebrid-status-badge">
          <span class="b-dot"></span>
          <span id="alldebrid-status-text">Non vérifié</span>
        </span>
      </h2>

      <div class="form-group">
        <label class="form-label">Clé API</label>
        <div class="input-row">
          <input type="password" id="alldebrid-key" class="form-input" placeholder="Entrez votre clé API AllDebrid..." autocomplete="off">
          <button class="btn btn-icon" onclick="toggleKeyVisibility()" title="Afficher / Masquer">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <p class="key-hint">Retrouvez votre clé sur alldebrid.com &rarr; Mon compte &rarr; Clés API</p>
      </div>

      <div class="form-group toggle-group">
        <label class="form-label">Activer AllDebrid</label>
        <label class="toggle">
          <input type="checkbox" id="alldebrid-enabled">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="key-actions">
        <button class="btn" onclick="testAllDebrid()">Tester la connexion</button>
        <button class="btn btn-primary" onclick="saveAllDebrid()">Sauvegarder</button>
      </div>
    </div>

    <!-- Téléchargements -->
    <div class="settings-card">
      <h2 class="card-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Téléchargements
      </h2>

      <div class="form-group">
        <label class="form-label">Téléchargements simultanés</label>
        <div class="num-selector" id="simultaneous-selector">
          <button class="btn-num" data-val="1" onclick="setSimultaneous(1)">1</button>
          <button class="btn-num" data-val="2" onclick="setSimultaneous(2)">2</button>
          <button class="btn-num" data-val="3" onclick="setSimultaneous(3)">3</button>
          <button class="btn-num" data-val="4" onclick="setSimultaneous(4)">4</button>
          <button class="btn-num" data-val="5" onclick="setSimultaneous(5)">5</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Dossier de destination par défaut</label>
        <input type="text" id="default-dest" class="form-input" placeholder="/opt/download-manager/downloads">
      </div>
    </div>

    <!-- Webhooks -->
    <div class="settings-card">
      <h2 class="card-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Notifications Webhook
      </h2>

      <div class="form-group toggle-group">
        <label class="form-label">Activer les webhooks</label>
        <label class="toggle">
          <input type="checkbox" id="webhook-enabled" onchange="toggleWebhookFields()">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div id="webhook-fields" class="hidden" style="margin-top:16px">
        <div class="form-group">
          <label class="form-label">URL du webhook</label>
          <input type="url" id="webhook-url" class="form-input" placeholder="https://discord.com/api/webhooks/..." autocomplete="off">
        </div>

        <div class="form-group">
          <label class="form-label">Format</label>
          <select id="webhook-format" class="form-input">
            <option value="generic">Générique (JSON)</option>
            <option value="discord">Discord</option>
            <option value="slack">Slack</option>
            <option value="telegram">Telegram</option>
            <option value="gotify">Gotify</option>
            <option value="ntfy">ntfy</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Événements</label>
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" id="wh-evt-complete" value="download_complete" checked>
              <span>Téléchargement terminé</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="wh-evt-failed" value="download_failed" checked>
              <span>Téléchargement échoué</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="wh-evt-package" value="package_complete" checked>
              <span>Paquet terminé</span>
            </label>
          </div>
        </div>

        <div class="key-actions">
          <button class="btn" onclick="testWebhook()">Tester le webhook</button>
        </div>
      </div>
    </div>

    <!-- Sauvegarder -->
    <div class="settings-footer">
      <button class="btn btn-primary btn-save" onclick="saveSettings()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Sauvegarder tout
      </button>
      <span id="save-result" class="inline-result"></span>
    </div>

  </div>
</div>

<div id="toast" class="toast hidden"></div>
<script src="/static/js/theme.js?v=15"></script>
<script src="/static/js/settings.js?v=15"></script>
<script src="/static/js/account.js?v=15"></script>
</body>
</html>
